<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表单</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 10px;
        }
        /* 文本输入框、下拉、文本域样式 */
        input[type="text"],
        input[type="password"],
        textarea,
        select {
            border: 1px solid #458b97; 
            border-radius: 4px; 
            padding: 5px; 
            width: 220px;
            margin: 3px 0 8px;
        }
        /* 按钮单独样式 */
        input[type="submit"],input[type="reset"] {/*同时选中两个按钮统一设置样式*/
            width: 100px; /*设置按钮固定宽度*/
            background: #1a79d1; /*设置按钮背景颜色*/
            color: white; /*设置按钮上的文字*/
            border: none; /*去除按钮默认的灰色边框*/
            cursor: pointer;/*鼠标悬浮到按钮上时，鼠标样式变成小手点击样式*/
            padding: 6px;/*按钮内部文字与按钮边框之间的内边距上下左右都为6px，让按钮不会紧贴文字*/
            margin-right: 10px;/*给每个按钮右侧设置10px外边距，让两个按钮之间隔开空隙*/
        }
        input[type="submit"]:hover {/*只针对提交按钮修改样式*/
            background: #052f66;/*鼠标停留时按钮背景色变化*/
        }
        /* 单选、复选框 */
        input[type="radio"],
        input[type="checkbox"] {
            width: auto; 
            margin: 0 4px 0 0; 
            vertical-align: middle;
        }
        p{
            margin-bottom: 8px;
        }
        br {
            display: none;
        }
    </style>
</head>
<body>
    <h2>查户口的来了</h2>
    <form action="#" method="get">
        <p>姓名：<input type="text" name="username"></p>
        <p>学号：<input type="text" name="stuId"></p>
        <p>身份证号：<input type="password" name="idCard"></p>
        <p>银行卡号：<input type="text" name="bankId"></p>
        <p>银行卡密码：<input type="password" name="bankPwd"></p>
        <p>支付密码：<input type="password" name="payPwd"></p>

        <div>性别：
            <input type="radio" name="sex" value="man" id="m"><label for="m">男</label>
            <input type="radio" name="sex" value="woman" id="w"><label for="w">女</label>
        </div>

        <div>平时喜欢玩：
            <div><input type="checkbox" name="hobby" value="xyx">4399小游戏</div>
            <div><input type="checkbox" name="hobby" value="wzry">王者荣耀</div>
            <div><input type="checkbox" name="hobby" value="jcc">金铲铲</div>
            <div><input type="checkbox" name="hobby" value="wllt">无畏契约</div>
            <div><input type="checkbox" name="hobby" value="sjz">三角洲</div>
            <div><input type="checkbox" name="hobby" value="dzpd">超级无敌爆炸好玩的蛋仔派对</div>
            <div><input type="checkbox" name="hobby" value="not">以上都不是</div>
        </div>

        <p>所在地：
            <select name="city">
                <option value="cq">重庆</option>
                <option value="sh">涪陵</option>
                <option value="xg">峡谷</option>
                <option value="dzd">蛋仔岛</option>
                <option value="bj">超出三界之外，不在五行之中~</option>
            </select>
        </p>

        <p>个人简介：
            <textarea rows="4" cols="30" name="intro"></textarea>
        </p>

        <p>
            <input type="submit" value="提交信息">
            <input type="reset" value="清空重填">
        </p>
    </form>
</body>
</html>
