Ss<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DIV+CSS布局</title>
    <style>/*选择器：id用#，class用.*/
        /* 清除默认内外边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 头部导航 */
        #header {
            width: 100%;/* 宽度占满浏览器可视区域 */
            height: 80px; /* 固定盒子高度 */
            background-color: #217ad9;/* 背景色 */
            color: #fff;/* 文字颜色 */
            line-height: 80px;/* 单行文字垂直居中：行高=盒子高度 */
            padding-left: 30px;/* 左侧内边距，文字不和左边贴死 */
            font-size: 22px;/* 文字大小 */
        }
        /* 主容器，清除浮动 */
        #container {
            width: 100%;
            overflow: hidden;
            /* 子元素使用float浮动会脱离标准流，父容器高度自动塌陷；
            overflow:hidden 可以触发BFC，自动包裹浮动子元素，清除浮动 */
        }
        /* 侧边栏 */
        #aside {
            width: 280px;
            height: 700px;
            background-color: #e6eeff;
            float: left;/* 左浮动，盒子横向并排，脱离标准文档流 */
            padding: 20px;/* 内部留白，即内边距 */
            font-size: 16px;
        }
        #aside li {
            margin: 12px 0;/* 上下外边距，拉开列表间距 */
            list-style-type: disc;/* 列表符号：实心圆点 */
            margin-left: 20px;/* 列表整体向右缩进 */
        }
        /* 正文区域 右侧主内容区*/
        #main {
            width: calc(100% - 280px);
            /* calc计算函数：页面总宽度减去侧边栏宽度，自适应剩余宽度，不会换行 */
            height: 700px;
            background-color: #f8f8f8;
            float: left;/* 和侧边栏一起左浮动，实现左右两栏布局 */
            padding: 30px;
        }
        /* 表单样式 */
        .form-item {
            margin: 15px 0;/* 表单上下间距 */
            font-size: 16px;
        }
        input {
            padding: 4px 8px;/* 输入框内部留白 */
            width: 220px;/* 输入框固定宽度 */
            margin-left: 8px;/* 和前面文字拉开距离 */
        }
        button {
            width: 90px;
            height: 32px;
            background-color: #217ad9;
            color: white;
            border: none;
            font-size: 15px;
            margin-right: 10px;
            cursor: pointer;
        }
        /* 底部 */
        #footer {
            width: 100%;
            height: 60px;
            background-color: #333333;
            color: #fff;
            text-align: center;/* 内部文字水平居中 */
            line-height: 60px;/* 单行文字垂直居中 */
            font-size: 15px;
        }
        /* 成绩单模块样式，默认隐藏 */
        #scorePage {
            display: none;
            /* 页面加载默认隐藏该区块，display:none完全不占页面空间 */
        }
    
        .score-card {
            width: 450px;
            margin: 20px auto;/* auto实现盒子自身水平居中 */
            border: 2px solid #217ad9;/* 边框 */
            padding: 25px;
            border-radius: 8px;/* 圆角边框 */
        }
        .score-card h2 {
            text-align: center;
            color: #217ad9;
            margin-bottom: 20px;/* 下方外边距，和下面内容分隔 */
        }
        .score-item {
            display: flex;/* flex弹性布局，实现左右文字两端对齐 */
            justify-content: space-between;/* 子元素左右两端分散对齐 */
            padding: 8px 0;
            font-size: 17px;
            border-bottom: 1px solid #eee;/* 底部分割线 */
        }
        .total-score {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;/* 文字加粗 */
            color: #d83030;
            text-align: right;/* 文字右对齐 */
        }
        .back-btn {
            margin-top: 20px;
            width: 120px;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div id="header">广西招生考试院2026年高考成绩查询</div>

    <!-- 主体容器 -->
    <div id="container">
        <!-- 左侧侧边栏 -->
        <div id="aside">
            <ul>
                <li>考试报名</li>
                <li>成绩查询</li>
                <li>志愿填报</li>
                <li>录取查询</li>
                <li>工作系统</li>
            </ul>
        </div>
        <!-- 右侧主内容区 -->
        <div id="main">
            <!-- 1. 查询表单页面（默认显示） -->
            <div id="searchPage">
                <h3>成绩查询</h3>
                <div class="form-item">
                    姓名：<input type="text" id="nameInput">
                </div>
                <div class="form-item">
                    准考证号：<input type="text" id="idInput">
                </div>
                <div class="form-item">
                    <button id="searchBtn">查询</button>
                    <button id="resetBtn">清空重填</button>
                </div>
            </div>

            <!-- 2. 成绩单页面（默认隐藏） -->
            <div id="scorePage">
                <div class="score-card">
                    <h2>2026年普通高等学校招生全国统一考试成绩单</h2>
                    <div class="score-item">
                        <span>考生姓名：</span>
                        <span id="showName"></span>
                    </div>
                    <div class="score-item">
                        <span>准考证号：</span>
                        <span id="showId"></span>
                    </div>
                    <div class="score-item">
                        <span>语文</span>
                        <span>135</span>
                    </div>
                    <div class="score-item">
                        <span>数学</span>
                        <span>128</span>
                    </div>
                    <div class="score-item">
                        <span>英语</span>
                        <span>145</span>
                    </div>
                    <div class="score-item">
                        <span>物理</span>
                        <span>88</span>
                    </div>
                    <div class="score-item">
                        <span>化学</span>
                        <span>92</span>
                    </div>
                    <div class="score-item">
                        <span>生物</span>
                        <span>96</span>
                    </div>
                    <div class="total-score">总分：<span id="totalNum"></span></div>
                    <button class="back-btn" id="backBtn">返回查询</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部版权 -->
    <div id="footer">版权信息2025级计算机科学与技术1班梨扒拉</div>

    <!-- JS逻辑代码 -->
    <script>
        // 1. 获取所有DOM元素
        const searchPage = document.getElementById('searchPage');
        const scorePage = document.getElementById('scorePage');
        const nameInput = document.getElementById('nameInput');
        const idInput = document.getElementById('idInput');
        const showName = document.getElementById('showName');
        const showId = document.getElementById('showId');
        const totalNum = document.getElementById('totalNum');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const backBtn = document.getElementById('backBtn');

        // 固定各科分数
        const scores = [135, 128, 145, 88, 92, 96];
        // 计算总分
        let total = 0;
        for(let i = 0; i < scores.length; i++){
            total += scores[i];
        }

        // 2. 查询按钮点击事件
        searchBtn.onclick = function(){
            // 获取输入内容
            let nameVal = nameInput.value.trim();
            let idVal = idInput.value.trim();
            // 判断输入不能为空
            if(nameVal === '' || idVal === ''){
                alert('请填写完整姓名和准考证号！');
                return;
            }
            // 给成绩单赋值考生信息
            showName.innerText = nameVal;
            showId.innerText = idVal;
            totalNum.innerText = total;
            // 切换页面：隐藏查询，显示成绩单
            searchPage.style.display = 'none';
            scorePage.style.display = 'block';
        }

        // 3. 清空重填按钮
        resetBtn.onclick = function(){
            nameInput.value = '';
            idInput.value = '';
        }

        // 4. 返回查询按钮
        backBtn.onclick = function(){
            // 切换回查询页面
            scorePage.style.display = 'none';
            searchPage.style.display = 'block';
        }
    </script>
</body>
</html>
