<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表单</title>
</head>
<body>
    <h2>查户口的来了</h2>
    <form action="#" method="get">
        <p>姓名：<input type="text" name="username"></p>
        <p>学号：<input type="text" name="stuId"></p>
        <p>身份证号<input type="password" name="pwd"></p>
        <p>银行卡号<input type="text" name="stuId"></p>
        <p>银行卡密码<input type="password" name="pwd"></p>
        <p>支付密码<input type="password" name="pwd"></p>
        <div>性别：
            <input type="radio" name="sex" value="man" id="m"><label for="m">男</label>
            <input type="radio" name="sex" value="woman" id="w"><label for="w">女</label>
        </div>
        <div>平时喜欢玩：<br>
            <input type="checkbox" name="hobby" value="xyx">4399小游戏<br>
            <input type="checkbox" name="hobby" value="wzry">王者荣耀<br>
            <input type="checkbox" name="hobby" value="jcc">金铲铲<br>
            <input type="checkbox" name="hobby" value="wllt">无畏契约<br>
            <input type="checkbox" name="hobby" value="sjz">三角洲<br>
            <input type="checkbox" name="hobby" value="dzpd">超级无敌爆炸好玩的蛋仔派对<br>
            <input type="checkbox" name="hobby" value="not">以上都不是
        </div>
        <p>所在地：
            <select name="city">
                <option value="cq">重庆</option>
                <option value="sh">涪陵</option>
                <option value="xg">峡谷</option>
                <option value="dzd">蛋仔岛</option>
                <option value="bj">超出三界之外，不在五行之中~</option>
            </select>
        </p>
        <p>个人简介：<br>
            <textarea rows="4" cols="30" name="intro"></textarea>
        </p>
        <p>
            <input type="submit" value="提交信息">
            <input type="reset" value="清空重填">
        </p>
    </form>
</body>
</html>
