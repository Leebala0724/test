<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 600px; /*宽*/
            height:750px; /*高*/
            background-color: pink; /*颜色*/
            border:2px solid rgb(53, 242, 242);/*边框：粗细，颜色*/
            margin-top: 100px;/*从上往下移300px*/
            margin-left: 100px;/*从左往右移100px*/
            border-radius: 30px;/*圆角*/
            box-shadow: gray 0px 8px 10px;/*圆角阴影：偏右，偏下，阴影发散*/
            font-size: 30px;/*盒内字体大小*/
            color:rgb(177, 15, 15);/*盒内字体颜色*/
            text-align: center;/*盒内文本左右位置*/
            line-height: 100px;/*盒内文本上下位置*/
        }
    </style>
</head>
<body>
    <div>待办事项清单</div>
</body>
</html>
